name: Rebuild Container Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  rebuild-image:
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: sanityctl
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Read version from pyproject.toml
        id: ver
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Compute image names
        id: image
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sanityctl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${DOCKERHUB_USERNAME}/sanityctl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        id: publish
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.publish.outputs.dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for GHCR
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ghcr }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=sanityctl
            org.opencontainers.image.description=Simple CLI for smoke tests and sanity checks in CI/CD pipelines
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Docker metadata for Docker Hub
        if: ${{ steps.publish.outputs.dockerhub == 'true' }}
        id: meta_dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.dockerhub }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=sanityctl
            org.opencontainers.image.description=Simple CLI for smoke tests and sanity checks in CI/CD pipelines
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Prepare combined tags
        id: tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.meta_ghcr.outputs.tags }}"
            if [ "${{ steps.publish.outputs.dockerhub }}" = "true" ]; then
              echo "${{ steps.meta_dockerhub.outputs.tags }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"


      - name: Build and push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          annotations: ${{ steps.meta_ghcr.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=release-docker
          cache-to: type=gha,mode=max,scope=release-docker
