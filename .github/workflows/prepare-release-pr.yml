name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without leading v, (e.g. X.Y.Z, not vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-pr:
    runs-on: ubuntu-24.04
    env:
      WORKFLOW_PR_TOKEN: ${{ secrets.WORKFLOW_PR_TOKEN }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Validate version format
        run: |
          ver="${{ inputs.version }}"
          python - <<'PY' "$ver"
          import re
          import sys

          ver = sys.argv[1]
          if not re.fullmatch(r"\d+\.\d+\.\d+", ver):
              raise SystemExit(f"Invalid semver: {ver}")
          print(f"Version OK: {ver}")
          PY

      - name: Bump version in pyproject.toml
        run: |
          ver="${{ inputs.version }}"
          python - <<'PY' "$ver"
          from pathlib import Path
          import re
          import sys

          ver = sys.argv[1]
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          new_text, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{ver}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Failed to update version in pyproject.toml")
          path.write_text(new_text, encoding="utf-8")
          print(f"Updated pyproject.toml to version {ver}")
          PY

      - name: Bump SANITYCTL_VERSION in Dockerfile
        run: |
          ver="${{ inputs.version }}"
          python - <<'PY' "$ver"
          from pathlib import Path
          import re
          import sys

          ver = sys.argv[1]
          path = Path("Dockerfile")
          text = path.read_text(encoding="utf-8")
          new_text, count = re.subn(
              r'(?m)^ARG SANITYCTL_VERSION=.*$',
              f'ARG SANITYCTL_VERSION={ver}',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Failed to update SANITYCTL_VERSION in Dockerfile")
          path.write_text(new_text, encoding="utf-8")
          print(f"Updated Dockerfile SANITYCTL_VERSION to {ver}")
          PY

      - name: Install project
        run: |
          make install

      - name: Run tests
        run: |
          make test

      - name: Open Pull Request with PAT
        if: ${{ env.WORKFLOW_PR_TOKEN != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.WORKFLOW_PR_TOKEN }}
          commit-message: "chore(release): v${{ inputs.version }}"
          branch: release/v${{ inputs.version }}
          base: main
          title: "chore(release): v${{ inputs.version }}"
          body: |
            This PR prepares release **v${{ inputs.version }}**:
            - bumps version in `pyproject.toml`
            - bumps `SANITYCTL_VERSION` in `Dockerfile`
            - verifies local install
            - runs tests

            After merge, the release workflow will:
            - create tag `v${{ inputs.version }}`
            - build `sanityctl-linux-amd64`
            - build `sanityctl-linux-arm64`
            - publish semver release assets
            - update rolling prerelease `latest`
            - publish container image tags `v${{ inputs.version }}` and `latest`
          labels: |
            release
          draft: false

      - name: Open Pull Request with default GITHUB_TOKEN
        if: ${{ env.WORKFLOW_PR_TOKEN == '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(release): v${{ inputs.version }}"
          branch: release/v${{ inputs.version }}
          base: main
          title: "chore(release): v${{ inputs.version }}"
          body: |
            This PR prepares release **v${{ inputs.version }}**:
            - bumps version in `pyproject.toml`
            - bumps `SANITYCTL_VERSION` in `Dockerfile`
            - verifies local install
            - runs tests
          labels: |
            release
          draft: false