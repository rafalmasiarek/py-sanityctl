name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  detect-version:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(release): v')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: ver
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

  test:
    needs: detect-version
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install project
        run: |
          make install

      - name: Run tests
        run: |
          make test

  build:
    needs: [detect-version, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            artifact_name: sanityctl-linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            artifact_name: sanityctl-linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Build binary
        run: |
          make build
          cp dist/sanityctl "${{ matrix.artifact_name }}"
          chmod +x "${{ matrix.artifact_name }}"

      - name: Smoke test binary
        run: |
          ./"${{ matrix.artifact_name }}" --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    needs: [detect-version, build]
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: sanityctl
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute image names
        id: image
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sanityctl" >> "$GITHUB_OUTPUT"
          echo "dockerhub=docker.io/${DOCKERHUB_USERNAME}/sanityctl" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish to Docker Hub
        id: publish
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sanityctl-linux-amd64
          path: release-assets

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sanityctl-linux-arm64
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum sanityctl-linux-amd64 sanityctl-linux-arm64 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create tag vX.Y.Z if missing
        run: |
          tag="${{ needs.detect-version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Create or update semver release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.detect-version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              release-assets/sanityctl-linux-amd64 \
              release-assets/sanityctl-linux-arm64 \
              release-assets/SHA256SUMS.txt \
              --clobber
          else
            gh release create "$tag" \
              release-assets/sanityctl-linux-amd64 \
              release-assets/sanityctl-linux-arm64 \
              release-assets/SHA256SUMS.txt \
              --title "$tag" \
              --generate-notes
          fi

      - name: Move latest tag to current main
        run: |
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Create or update rolling prerelease latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "latest" \
              --notes "Rolling prerelease built from main. For stable consumption use semver tags."
          else
            gh release create latest \
              --prerelease \
              --title "latest" \
              --notes "Rolling prerelease built from main. For stable consumption use semver tags."
          fi

      - name: Upload latest assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest \
            release-assets/sanityctl-linux-amd64 \
            release-assets/sanityctl-linux-arm64 \
            release-assets/SHA256SUMS.txt \
            --clobber

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.publish.outputs.dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for GHCR
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ghcr }}
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=sanityctl
            org.opencontainers.image.description=Simple CLI for smoke tests and sanity checks in CI/CD pipelines
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.detect-version.outputs.version }}

      - name: Docker metadata for Docker Hub
        if: ${{ steps.publish.outputs.dockerhub == 'true' }}
        id: meta_dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.dockerhub }}
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=sanityctl
            org.opencontainers.image.description=Simple CLI for smoke tests and sanity checks in CI/CD pipelines
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.detect-version.outputs.version }}

      - name: Prepare combined tags
        id: tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.meta_ghcr.outputs.tags }}"
            if [ "${{ steps.publish.outputs.dockerhub }}" = "true" ]; then
              echo "${{ steps.meta_dockerhub.outputs.tags }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          annotations: ${{ steps.meta_ghcr.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=sanityctl-docker
          cache-to: type=gha,mode=max,scope=sanityctl-docker

      - name: Add container pull info to semver release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.detect-version.outputs.tag }}"
          ghcr_image="${{ steps.image.outputs.ghcr }}"
          current="$(gh release view "$tag" --json body -q .body)"
          marker="## Container image"

          if ! printf '%s' "$current" | grep -q "$marker"; then
            {
              printf '%s\n' "$current"
              printf '\n## Container image\n\n'
              printf 'Pull the versioned image from GHCR:\n\n'
              printf '```bash\n'
              printf 'docker pull %s:%s\n' "$ghcr_image" "$tag"
              printf '```\n\n'
              printf 'Pull the rolling image from GHCR:\n\n'
              printf '```bash\n'
              printf 'docker pull %s:latest\n' "$ghcr_image"
              printf '```\n'
              if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
                printf '\nDocker Hub mirrors:\n\n'
                printf '```bash\n'
                printf 'docker pull docker.io/%s/sanityctl:%s\n' "$DOCKERHUB_USERNAME" "$tag"
                printf 'docker pull docker.io/%s/sanityctl:latest\n' "$DOCKERHUB_USERNAME"
                printf '```\n'
              fi
            } > /tmp/release-notes.txt
            gh release edit "$tag" --notes-file /tmp/release-notes.txt
          fi

      - name: Add container pull info to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ghcr_image="${{ steps.image.outputs.ghcr }}"
          current="$(gh release view latest --json body -q .body)"
          marker="## Container image"

          if ! printf '%s' "$current" | grep -q "$marker"; then
            {
              printf '%s\n' "$current"
              printf '\n## Container image\n\n'
              printf 'Pull the rolling image from GHCR:\n\n'
              printf '```bash\n'
              printf 'docker pull %s:latest\n' "$ghcr_image"
              printf '```\n'
              if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
                printf '\nDocker Hub mirror:\n\n'
                printf '```bash\n'
                printf 'docker pull docker.io/%s/sanityctl:latest\n' "$DOCKERHUB_USERNAME"
                printf '```\n'
              fi
            } > /tmp/latest-release-notes.txt
            gh release edit latest --notes-file /tmp/latest-release-notes.txt
