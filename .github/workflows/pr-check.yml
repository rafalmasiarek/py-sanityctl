name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to test manually, e.g. 123"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: sanityctl

    steps:
      - name: Checkout PR branch for manual run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Checkout default event ref
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.pr_number == '' }}
        uses: actions/checkout@v4

      - name: Capture checked out commit
        id: gitmeta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read version from pyproject.toml
        id: ver
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          print(f"version={version}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install project
        run: |
          make install

      - name: Run tests
        run: |
          make test

      - name: Build binary
        run: |
          make build

      - name: Smoke test binary
        run: |
          test -x dist/sanityctl
          ./dist/sanityctl --help >/dev/null
          ./dist/sanityctl run --help >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: local/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=candidate
          labels: |
            org.opencontainers.image.title=sanityctl
            org.opencontainers.image.description=Simple CLI for smoke tests and sanity checks in CI/CD pipelines
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.gitmeta.outputs.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build local candidate image
        run: |
          cat > Dockerfile.pr-check <<'EOF'
          FROM debian:bookworm-slim
          COPY dist/sanityctl /usr/local/bin/sanityctl
          RUN chmod +x /usr/local/bin/sanityctl
          CMD ["sanityctl"]
          EOF
          docker build -f Dockerfile.pr-check -t local/${IMAGE_NAME}:candidate .

      - name: Smoke test Docker image
        run: |
          docker run --rm local/${IMAGE_NAME}:candidate --help >/dev/null
          docker run --rm local/${IMAGE_NAME}:candidate run --help >/dev/null

      - name: Comment success on PR
        if: ${{ success() && github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '✅ **Manual PR check passed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Validated:',
                '- install',
                '- tests',
                '- standalone binary build',
                '- binary smoke test (`--help`)',
                '- Docker image build',
                '- Docker image smoke test (`--help`)',
              ].join('\n')
            });

      - name: Comment failure on PR
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '❌ **Manual PR check failed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Open the workflow run for logs and the failing step details.'
              ].join('\n')
            });