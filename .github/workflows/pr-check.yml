name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to test manually"
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: sanityctl

    steps:
      - name: Set PR context for automatic run
        if: ${{ github.event_name == 'pull_request' }}
        id: prctx_auto
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set PR context for manual run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: prctx_manual
        run: |
          echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=refs/pull/${{ inputs.pr_number }}/head" >> "$GITHUB_OUTPUT"

      - name: Checkout PR source branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.prctx_auto.outputs.checkout_ref || steps.prctx_manual.outputs.checkout_ref }}

      - name: Capture checked out commit
        id: gitmeta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read version from pyproject.toml
        id: ver
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          print(f"version={version}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install project
        run: |
          make install

      - name: Run tests
        run: |
          make test

      - name: Build binary
        run: |
          make build

      - name: Smoke test binary
        run: |
          test -x dist/sanityctl
          ./dist/sanityctl --help >/dev/null
          ./dist/sanityctl run --help >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          platforms: linux/amd64
          tags: local/${{ env.IMAGE_NAME }}:candidate
          provenance: false
          sbom: false
          cache-from: type=gha,scope=sanityctl-docker
          cache-to: type=gha,mode=max,scope=sanityctl-docker

      - name: Smoke test Docker image
        run: |
          docker run --rm local/${IMAGE_NAME}:candidate --help >/dev/null
          docker run --rm local/${IMAGE_NAME}:candidate run --help >/dev/null

      - name: Comment success on PR
        if: ${{ success() }}
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.prctx_auto.outputs.pr_number || steps.prctx_manual.outputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '✅ **PR check passed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Validated:',
                '- install',
                '- tests',
                '- standalone binary build',
                '- binary smoke test (`--help`)',
                '- Docker image build',
                '- Docker image smoke test (`--help`)',
              ].join('\n')
            });

      - name: Comment failure on PR
        if: ${{ failure() }}
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.prctx_auto.outputs.pr_number || steps.prctx_manual.outputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '❌ **PR check failed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Open the workflow run for logs and the failing step details.'
              ].join('\n')
            });
