name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to test manually, e.g. 123"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout PR branch for manual run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Checkout default event ref
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.pr_number == '' }}
        uses: actions/checkout@v4

      - name: Capture checked out commit
        id: gitmeta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install project
        run: |
          make install

      - name: Run tests
        run: |
          make test

      - name: Build binary
        run: |
          make build

      - name: Smoke test binary
        run: |
          test -x dist/sanityctl
          ./dist/sanityctl --help >/dev/null
          ./dist/sanityctl run --help >/dev/null

      - name: Comment success on PR
        if: ${{ success() && github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '✅ **Manual PR check passed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Validated:',
                '- install',
                '- tests',
                '- standalone binary build',
                '- binary smoke test (`--help`)',
              ].join('\n')
            });

      - name: Comment failure on PR
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '❌ **Manual PR check failed**',
                '',
                `- PR: #${prNumber}`,
                `- Workflow run: ${runUrl}`,
                `- Commit: \`${{ steps.gitmeta.outputs.sha }}\``,
                '',
                'Open the workflow run for logs and the failing step details.'
              ].join('\n')
            });
